apiVersion: v1
kind: ServiceAccount
metadata:
  name: detector
  namespace: ai-ops-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-ops-detector
rules:
  - apiGroups: [""]
    resources: ["pods", "events", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-ops-detector-binding
subjects:
  - kind: ServiceAccount
    name: detector
    namespace: ai-ops-agent
roleRef:
  kind: ClusterRole
  name: ai-ops-detector
  apiGroup: rbac.authorization.k8s.io
