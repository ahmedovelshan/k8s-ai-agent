apiVersion: apps/v1
kind: Deployment
metadata:
  name: detector
  namespace: ai-ops-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: detector
  template:
    metadata:
      labels:
        app: detector
    spec:
      serviceAccountName: detector
      containers:
        - name: detector
          image: REPLACE_WITH_YOUR_ECR_IMAGE_URI
          imagePullPolicy: Always
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: WATCH_NAMESPACE
              value: ""   # empty = watch all namespaces
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              cpu: "500m"
              memory: 512Mi
